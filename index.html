<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semana do zero ao programador - Fundo Mágico</title>
</head>

<body>
    <header>
        <h1>Fundo Mágico</h1>
        <p>Transforme suas ideias com um background incriveis com poder da IA. Descreva o que você imagina e veja
            acontecer.</p>
    </header>
    <main class="container">
        <section class="card main - card ">
            <h2> Descreva o background que você deseja</h2>

            <form class="form-group">
                <textarea id="description"
                    placeholder="Ex : Um gradiente azul suave que vai do azul claro até o azul escuro "></textarea>
                <button id="generate-btn" class="btn-magic">

                    <span>Gerar background Mágico</span>
                </button>
            </form>
        </section>
        <section id="preview-section"></section>
        <section id="code-output" class="code-grid">
            <div class="car code-card">
                <h3 class="code-title">Codigo HTML</h3>
                <pre id="html-code" class="code-block"></pre>
            </div>
            <div class="card code-card">
                <h3 class="code-title">Codigo CSS</h3>
                <pre id="css-code" class="code-block"></pre>
            </div>
        </section>
    </main>
</body>

</html>
